<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uhdrusoriginal</title>
    <style>
        /* Растягиваем на весь экран без рамок */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #000; 
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            position: absolute; 
            top: 0; 
            left: 0; 
        }
    </style>
</head>
<body>
    <!-- Используем короткую ссылку без русских букв -->
    <iframe src="https://google.com"></iframe>
</body>
</html>
